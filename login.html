
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nusrat International</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 40px 36px;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    .card img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 12px;
    }

    .card h2 { font-size: 17px; color: #222; }
    .card p  { font-size: 13px; color: #888; margin-bottom: 24px; }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }

    input:focus { border-color: #555; }

    button {
      width: 100%;
      padding: 10px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #444; }

    .msg { margin-top: 10px; font-size: 13px; min-height: 18px; }
    .msg.error   { color: #c0392b; }
    .msg.success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="card">
    <img
      src="https://image2url.com/r2/default/images/1771964863151-2518979a-0fe0-4990-9a1a-9175b88e5ac8.jpg"
      alt="Logo"
      onerror="this.style.display='none'"
    />
    <h2>Nusrat International <br>& <br>
        Nusrat Travels</h2>

    <input type="password" id="pw" placeholder="Enter password" />
    <button onclick="login()">Login</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const PASS = "nusrat2025"; // ← change password here

    function login() {
      const msg = document.getElementById('msg');
      if (document.getElementById('pw').value === PASS) {
        msg.className = 'msg success';
        msg.textContent = 'Access granted!';
      } else {
        msg.className = 'msg error';
        msg.textContent = 'Wrong password.';
        document.getElementById('pw').value = '';
      }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
