<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Nusrat International</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .error-container {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 900;
      color: var(--gold);
      margin: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 2.5rem;
      color: var(--text);
      margin: 1rem 0;
    }
    .error-message {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 500px;
    }
    .btn-home {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--gold);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-home:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div>
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back to exploring amazing destinations.
      </p>
      <a href="/" class="btn-home">Go Home</a>
    </div>
  </div>
</body>
</html>
